<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; font-src 'self' data:; connect-src 'self' https: http: ws: wss:;">
  <title>下载管理 - Drift 浏览器</title>
  <link rel="stylesheet" href="css/download-window.css">
</head>
<body data-theme="dark">
  <div class="dl-win">
    <!-- 标题栏 -->
    <div class="dl-win-titlebar">
      <div class="dl-win-title">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1v7M5 6l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="2" y="10" width="12" height="3.5" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.1"/></svg>
        下载管理
      </div>
      <button class="dl-win-close" id="btnCloseWin">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.2"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>

    <!-- 工具栏 -->
    <div class="dl-win-toolbar">
      <button class="dl-win-btn" id="btnClearAll">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 3.5h10M5 3.5V2.5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1M4 3.5l.5 8a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1l.5-8" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
        清空已完成
      </button>
      <button class="dl-win-btn" id="btnOpenFolder">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 3h4l1.5 1.5H12v7H2V3z" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        打开文件夹
      </button>
      <div class="dl-win-path" id="downloadPathLabel"></div>
    </div>

    <!-- 下载列表 -->
    <div class="dl-win-list" id="downloadList">
      <div class="dl-win-empty" id="emptyMsg">
        <svg width="48" height="48" viewBox="0 0 48 48"><path d="M24 8v16M16 18l8 8 8-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="6" y="30" width="36" height="10" rx="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <span>暂无下载任务</span>
      </div>
    </div>

    <!-- 状态栏 -->
    <div class="dl-win-footer" id="statusBar">
      <span id="activeCount">0 个下载中</span>
    </div>
  </div>
  <script src="js/download-renderer.js"></script>
</body>
</html>
