<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>任务管理器 - Drift 浏览器</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg-0:#0c0c10;--bg-1:#121218;--bg-2:#1a1a22;
      --fg-0:#e8e8ed;--fg-1:#a0a0a8;--fg-2:#606068;
      --accent:#4A90D9;--accent2:#6C5CE7;--border:#252530;
      --red:#ef4444;
      --green:#22c55e;
    }
    [data-theme="light"]{
      --bg-0:#f5f5f7;--bg-1:#ffffff;--bg-2:#e8e8ed;
      --fg-0:#1a1a1a;--fg-1:#4a4a4a;--fg-2:#8a8a8a;
      --border:#d1d1d6;
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      background:var(--bg-0);color:var(--fg-0);
      min-height:100vh;display:flex;flex-direction:column;
    }
    .header{
      background:var(--bg-1);border-bottom:1px solid var(--border);
      padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
      -webkit-app-region:drag;
    }
    .header h1{font-size:14px;font-weight:600}
    .header-actions{-webkit-app-region:no-drag;display:flex;gap:8px}
    .btn{
      padding:6px 12px;border-radius:6px;border:none;
      background:var(--bg-2);color:var(--fg-1);font-size:12px;cursor:pointer;
      transition:all 0.15s;
    }
    .btn:hover{background:var(--accent);color:#fff}
    .btn-danger:hover{background:var(--red)}
    .summary{
      display:flex;gap:12px;padding:16px;border-bottom:1px solid var(--border);
    }
    .summary-item{
      flex:1;background:var(--bg-1);border-radius:8px;padding:12px;
      text-align:center;border:1px solid var(--border);
    }
    .summary-label{font-size:11px;color:var(--fg-2);margin-bottom:4px}
    .summary-value{font-size:24px;font-weight:600;color:var(--fg-0)}
    .task-list{flex:1;overflow-y:auto;padding:8px}
    .task-item{
      display:flex;align-items:center;gap:12px;padding:10px 12px;
      background:var(--bg-1);border-radius:8px;margin-bottom:6px;
      transition:background 0.15s;border:1px solid transparent;
    }
    .task-item:hover{background:var(--bg-2);border-color:var(--border)}
    .task-item.frozen{opacity:0.7;background:var(--bg-2)}
    .task-item.frozen .task-title{color:var(--fg-2)}
    .task-item.frozen:hover{opacity:1;background:var(--bg-1)}
    .task-icon{width:24px;height:24px;border-radius:4px;object-fit:contain}
    .task-info{flex:1;min-width:0;cursor:pointer}
    .task-title{font-size:13px;color:var(--fg-0);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .task-url{font-size:11px;color:var(--fg-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .task-memory{font-size:12px;color:var(--fg-1);font-weight:500;margin-right:8px;padding:4px 8px;background:var(--bg-2);border-radius:4px}
    .task-memory.frozen{color:var(--green);background:rgba(34,197,94,0.1)}
    .task-close{
      width:24px;height:24px;display:flex;align-items:center;justify-content:center;
      border-radius:4px;border:none;background:transparent;
      color:var(--fg-2);cursor:pointer;transition:all 0.15s;
      opacity:0;font-size:16px;
    }
    .task-item:hover .task-close{opacity:1}
    .task-close:hover{background:rgba(232,64,87,0.15);color:var(--red)}
    .empty{text-align:center;padding:40px;color:var(--fg-2)}
  </style>
</head>
<body data-theme="dark">
<script>
  // 同步初始化主题（避免闪烁）
  const { ipcRenderer } = require('electron');
  
  // 初始化主题
  async function initTheme() {
    try {
      const theme = await ipcRenderer.invoke('get-theme');
      document.body.dataset.theme = theme || 'dark';
    } catch (e) {}
  }
  initTheme();
  
  // 定期同步主题（每5秒检查一次）
  setInterval(async () => {
    try {
      const theme = await ipcRenderer.invoke('get-theme');
      if (document.body.dataset.theme !== theme) {
        document.body.dataset.theme = theme || 'dark';
      }
    } catch (e) {}
  }, 5000);
</script>
<div class="header">
    <h1>任务管理器</h1>
    <div class="header-actions">
      <button class="btn" id="refreshBtn">刷新</button>
      <button class="btn btn-danger" id="closeAllBtn">关闭所有</button>
      <button class="btn" id="closeBtn">关闭窗口</button>
    </div>
  </div>
  <div class="summary">
    <div class="summary-item">
      <div class="summary-label">标签页</div>
      <div class="summary-value" id="tabCount">0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">内存使用</div>
      <div class="summary-value" id="memoryUsage">-- MB</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">CPU 使用率</div>
      <div class="summary-value" id="cpuUsage">--%</div>
    </div>
  </div>
  <div class="task-list" id="taskList"></div>
  <script>
    const { ipcRenderer } = require('electron');
    
    document.getElementById('closeBtn').addEventListener('click', () => {
      window.close();
    });
    
    document.getElementById('refreshBtn').addEventListener('click', () => {
      loadTasks();
    });
    
    document.getElementById('closeAllBtn').addEventListener('click', () => {
      if (confirm('确定要关闭所有标签页吗？')) {
        ipcRenderer.send('close-all-tabs');
      }
    });
    
    async function loadTasks() {
      try {
        const data = await ipcRenderer.invoke('get-task-manager-data');
        if (!data) return;
        
        document.getElementById('tabCount').textContent = data.tabs ? data.tabs.length : 0;
        document.getElementById('memoryUsage').textContent = data.memory || '-- MB';
        document.getElementById('cpuUsage').textContent = data.cpu || '--%';
        
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        
        if (!data.tabs || data.tabs.length === 0) {
          list.innerHTML = '<div class="empty">暂无标签页</div>';
          return;
        }
        
        data.tabs.forEach((tab, i) => {
          const el = document.createElement('div');
          el.className = 'task-item' + (tab.frozen ? ' frozen' : '');
          el.innerHTML = `
            <img class="task-icon" src="${tab.icon || ''}" alt="">
            <div class="task-info" data-tab-id="${tab.id}">
              <div class="task-title">${tab.frozen ? '❄️ ' : ''}${escapeHtml(tab.title || '新标签页')}</div>
              <div class="task-url">${escapeHtml(tab.url || 'about:blank')}</div>
            </div>
            <span class="task-memory${tab.frozen ? ' frozen' : ''}">${tab.memory || '-- MB'}</span>
            <button class="task-close" data-tab-id="${tab.id}" title="关闭标签页">×</button>
          `;
          
          // 点击切换到标签页
          el.querySelector('.task-info').addEventListener('click', () => {
            ipcRenderer.send('switch-to-tab', tab.id);
          });
          
          // 点击关闭按钮
          el.querySelector('.task-close').addEventListener('click', (e) => {
            e.stopPropagation();
            ipcRenderer.send('close-tab', tab.id);
            setTimeout(loadTasks, 300);
          });
          
          list.appendChild(el);
        });
      } catch (e) {
        console.error('[TaskManager] 加载失败:', e);
      }
    }
    
    // HTML 转义函数
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    loadTasks();
    setInterval(loadTasks, 2000);
  </script>
</body>
</html>
